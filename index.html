<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时新闻</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 40px;
        }
        .
header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e94560;
        }
        .header h1 {
            font-size: 48px;
            color: #e94560;
            margin-bottom: 10px;
        }
        .header .time {
            font-size: 24px;
            color: #888;
        }
        .news-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .news-item {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 25px 30px;
            margin-bottom: 20px;
            border-left: 4px solid #e94560;
        }
        .news-title {
            font-size: 32px;
            margin-bottom: 12px;
            line-height: 1.4;
}
        .news-meta {
            font-size: 18px;
            color: #888;
        }
        .news-source {
            color: #e94560;
            margin-right: 20px;
        }
        .loading {
            text-align: center;
            font-size: 36px;
            padding: 100px;
            color: #888;
        }
        .update-time {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            color: #888;
            border-radius: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    
        

📰 实时新闻


        
加载中...

    



<div class="news-container" id="newsContainer">
🔄 正在加载新闻...

    



<div class="update-time" id="updateTime">更新时间：--</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN');
    }

    async function loadNews() {
        try {
            const response = await fetch('news.json?t=' + Date.now());
            const data = await response.json();
            
            let html = '';
            data.news.forEach(item => {
                html += `
                    <div class="news-item">
                        <div class="news-title">${item.title}</div>
                        <div class="news-meta">
${item.source}
                                ${item.time}
                        
                    `;
                });
                document.getElementById('newsContainer').innerHTML = html;
                document.getElementById('updateTime').textContent = '更新时间：' + data.updateTime;
            } catch (error) {
                document.getElementById('newsContainer').innerHTML = 
                    '
⚠️ 加载失败，请稍后刷新
';
            }
            updateTime();
        }

    setInterval(loadNews, 600000);
    loadNews();
</script>

</body>
</html>
