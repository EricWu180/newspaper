<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时新闻</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e94560;
        }
        .header h1 {
            font-size: 48px;
            color: #e94560;
            margin-bottom: 10px;
        }
        .
header .time {
            font-size: 24px;
            color: #888;
        }
        .news-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .news-item {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 25px 30px;
            margin-bottom: 20px;
            border-left: 4px solid #e94560;
        }
        .news-title {
            font-size: 32px;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .news-meta {
            font-size: 18px;
            color: #888;
        }
        .news-source {
            color: #e94560;
            margin-right: 20px;
        }
        .loading {
            text-align: center;
            font-size: 36px;
            padding: 100px;
color: #888;
        }
        .update-time {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            color: #888;
            border-radius: 8px;
            font-size: 16px;
        }
        .refresh-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 30px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
        }
        .refresh-btn:hover {
            background: #ff6b6b;
        }
    </style>
</head>
<body>
    <button class="refresh-btn" onclick="loadNews()">🔄 刷新</button>



<div
class="header">
📰 实时新闻


        
加载中...

    



<div class="news-container" id="newsContainer">
    <div class="loading">🔄 正在加载新闻...</div>
</div>

<div class="update-time" id="updateTime">更新时间：--</div>

<script>
    // ⚠️ 替换成你的天行数据 API Key
    const API_KEY = '0c91863211557aa1efea0cec5d111e5f';
    
    // 自动刷新间隔（毫秒）
    const REFRESH_INTERVAL = 600000; // 10 分钟

    // 更新时间
    function updateTime() {
        const now = new Date();
        const timeStr = now.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
        document.getElementById('currentTime').textContent =
timeStr;
        }



    // 格式化时间
    function formatTime(timeStr) {
        try {
            const date = new Date(timeStr);
            const now = new Date();
            const diff = (now - date) / 1000 / 60;
            if (diff < 1) return '刚刚';
            if (diff < 60) return Math.floor(diff) + '分钟前';
            if (diff < 1440) return Math.floor(diff / 60) + '小时前';
            return Math.floor(diff / 1440) + '天前';
        } catch {
            return '未知时间';
        }
    }

    // 加载新闻
    async function loadNews() {
        const container = document.getElementById('newsContainer');
        container.innerHTML = '<div class="loading">🔄 正在加载新闻...</div>';
        
        try {
            const response
= await fetch(http://api.tianapi.com/general/index?key=${API_KEY}&num=10);
                const data = await response.json();



            if (data.code === 200) {
                let html = '';
                data.newslist.forEach(item => {
                    html += `
                        <div class="news-item">
                            <div class="news-title">${item.title}</div>
                            <div class="news-meta">
                                <span class="news-source">${item.source || '未知'}</span>
                                <span>${formatTime(item.ctime)}</span>
                            </div>
                        </div>
                    `;
                });
container.innerHTML = html;
                    document.getElementById('updateTime').textContent = '更新时间：' + new Date().toLocaleString('zh-CN');
                } else {
                    container.innerHTML = <div class="loading">⚠️ ${data.msg || '加载失败'}</div>;
                }
            } catch (error) {
                container.innerHTML = '
⚠️ 网络错误，请检查 API Key 或网络连接
';
            }
            updateTime();
        }

    // 自动刷新
    setInterval(loadNews, REFRESH_INTERVAL);

    // 页面加载时获取新闻
    loadNews();
</script>

</body>
</html>
