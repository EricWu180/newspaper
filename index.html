<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>实时新闻</title>
<style>
body{font-family:"Microsoft YaHei";background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:40px;margin:0}
h1{color:#e94560;text-align:center;font-size:48px}
.time{text-align:center;color:#888;font-size:24px;margin-bottom:40px}
.news-item{background:rgba(255,255,255,0.05);border-radius:10px;padding:25px 30px;margin-bottom:20px;border-left:4px solid #e94560}
.news-title{font-size:32px;margin-bottom:12px}
.news-meta{font-size:18px;color:#888}
.news-source{color:#e94560;margin-right:20px}
.loading{text-align:center;font-size:36px;padding:100px;color:#888}
.update{position:fixed;bottom:20px;right:20px;background:rgba(0,0,0,0.5);padding:10px 20px;border-radius:8px;color:#888}
</style>
</head>
<body>
<h1>📰 实时新闻</h1>
<div class="time" id="time"></div>
<div id="news"><div class="loading">🔄 加载中...</div></div>
<div class="update" id="update"></div>
<script>
// ⚠️ 填你的天行数据 API Key
const API_KEY='0c91863211557aa1efea0cec5d111e5f';

document.getElementById('time').textContent=new Date().toLocaleString('zh-CN');

fetch('http://api.tianapi.com/general/index?key='+API_KEY+'&num=10')
.then(r=>r.json())
.then(d=>{
if(d.code===200){
let h='';
d.newslist.forEach(n=>{
h+='<div class="news-item"><div class="news-title">'+n.title+'</div><div class="news-meta"><span class="news-source">'+(n.source||'未知')+'</span><span>'+formatTime(n.ctime)+'</span></div></div>'
});
document.getElementById('news').innerHTML=h;
document.getElementById('update').textContent='更新时间：'+new Date().toLocaleString('zh-CN');
}else{
document.getElementById('news').innerHTML='<div class="loading">⚠️ '+d.msg+'</div>';
}
})
.catch(e=>{
document.getElementById('news').innerHTML='<div class="loading">⚠️ 网络错误</div>';
});

function formatTime(t){
try{
const d=new Date(t),n=new Date(),m=(n-d)/1000/60;
if(m<1)return'刚刚';
if(m<60)return Math.floor(m)+'分钟前';
if(m<1440)return Math.floor(m/60)+'小时前';
return Math.floor(m/1440)+'天前';
}catch{return'未知时间';}
}

// 每 10 分钟自动刷新
setInterval(()=>location.reload(),600000);
</script>
</body>
</html>
