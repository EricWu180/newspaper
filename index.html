<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>实时新闻</title>
<style>
body{font-family:"Microsoft YaHei";background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:40px;margin:0}
h1{color:#e94560;text-align:center;font-size:48px}
.time{text-align:center;color:#888;font-size:24px;margin-bottom:40px}
.news-item{background:rgba(255,255,255,0.05);border-radius:10px;padding:25px 30px;margin-bottom:20px;border-left:4px solid #e94560}
.news-title{font-size:32px;margin-bottom:12px}
.news-meta{font-size:18px;color:#888}
.news-source{color:#e94560;margin-right:20px}
.loading{text-align:center;font-size:36px;padding:100px;color:#888}
.update{position:fixed;bottom:20px;right:20px;background:rgba(0,0,0,0.5);padding:10px 20px;border-radius:8px;color:#888}
</style>
</head>
<body>
<h1>📰 实时新闻</h1>
<div class="time" id="time"></div>
<div id="news"><div class="loading">🔄 加载中...</div></div>
<div class="update" id="update"></div>
<script>
document.getElementById('time').textContent=new Date().toLocaleString('zh-CN');
fetch('news.json?t='+Date.now()).then(r=>r.json()).then(d=>{
let h='';d.news.forEach(n=>{h+='<div class="news-item"><div class="news-title">'+n.title+'</div><div class="news-meta"><span class="news-source">'+n.source+'</span><span>'+n.time+'</span></div></div>'});
document.getElementById('news').innerHTML=h;
document.getElementById('update').textContent='更新时间：'+d.updateTime;
}).catch(e=>{document.getElementById('news').innerHTML='<div class="loading">⚠️ 加载失败</div>';});
</script>
</body>

</html>
